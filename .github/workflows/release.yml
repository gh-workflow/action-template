name: Release

"on":
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  change-validation:
    uses: ./.github/workflows/change-validation.yml

  verify-release-refs:
    name: Verify release references
    needs: [change-validation]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Verify README uses current tag
        env:
          ACTION_OWNER: ${{ github.repository_owner }}
          ACTION_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          action_ref="${ACTION_OWNER}/${ACTION_REPO}"
          if grep -nP "${action_ref}@(?!${GITHUB_REF_NAME}\\b)" \
              README.md
          then
            echo "Found action refs not pinned to ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  release:
    name: Publish release
    needs: [change-validation, verify-release-refs]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
